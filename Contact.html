---
layout: default
title: Contact
---

<section class="section">
  <div class="section-title"><h2>Contact</h2></div>
  <div class="contact-card reveal">
    <p style="margin-top:0; color: var(--ink-soft);">Feel free to reach out — I'm always happy to talk research and collaboration.</p>
    <ul>
      <li><span class="label">Email</span> <a href="mailto:{{ site.email }}">{{ site.email }}</a></li>
      <li><span class="label">GitHub</span> <a href="https://github.com/{{ site.profile.github }}" target="_blank" rel="noopener">{{ site.profile.github }}</a></li>
      <li><span class="label">Instagram</span> {{ site.profile.instagram }}</li>
    </ul>
  </div>
</section>
